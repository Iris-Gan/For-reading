async function generateProfessorResponse(professorName, professorContext, chapterTitle, chapterContent, userComment) {
  try {
    const systemPrompt = `你是${professorName}教授，一位深谙批判理论、文化研究和哲学的学者。
${professorContext ? `以下是关于你的学术背景信息：\n${professorContext}\n` : ''}
你正在与一位读者共读瓦尔特·本雅明的《单行道》。你的回复应该：
1. 体现你独特的学术视角和研究方向
2. 对读者的评论进行深入回应，提出新的见解
3. 引用相关理论或概念来拓展讨论
4. 语气应该像一位热情的学者在与学生进行深度对话
5. 用中文回复，200字以内
6. 不要使用markdown格式`;
    const userMsg = `当前章节：「${chapterTitle}」\n\n章节内容：\n${chapterContent.substring(0, 500)}\n\n读者的评论：\n${userComment}\n\n请以${professorName}教授的身份回应这位读者的评论。`;
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: "user", content: userMsg }],
      }),
    });
    const data = await response.json();
    const text = data.content?.map(i => i.type === "text" ? i.text : "").filter(Boolean).join("\n");
    return text || "（教授正在思考中…请稍后再试）";
  } catch (err) {
    return "（网络繁忙，教授暂时无法回复。请稍后再试。）";
  }
}

function UploadScreen({ onStartReading }) {
  const [bookTitle, setBookTitle] = useState("");
  const [chapters, setChapters] = useState([]);
  const [professorName, setProfessorName] = useState("");
  const [professorContext, setProfessorContext] = useState("");
  const [uploadStatus, setUploadStatus] = useState("");
  const [profUploadStatus, setProfUploadStatus] = useState("");
  const fileRef = useRef(null);
  const profFileRef = useRef(null);

  const parseTextToChapters = (text, title) => {
    const lines = text.split("\n").filter(l => l.trim());
    const chs = []; let cur = null;
    for (const line of lines) {
      if (line.length < 40 && (line.match(/^第.+[章节篇]/) || line.match(/^[一二三四五六七八九十]+[、.]/) || line.match(/^\d+[.、]/) || line.match(/^Chapter/i))) {
        if (cur) chs.push(cur);
        cur = { id: chs.length + 1, title: line.trim(), content: "" };
      } else {
        if (!cur) cur = { id: 1, title: title || "第一章", content: "" };
        cur.content += line + "\n\n";
      }
    }
    if (cur) chs.push(cur);
    if (chs.length === 0) {
      const ps = text.split(/\n\s*\n/).filter(p => p.trim());
      const sz = Math.ceil(ps.length / Math.max(1, Math.floor(ps.length / 5)));
      for (let i = 0; i < ps.length; i += sz)
        chs.push({ id: chs.length + 1, title: `第${chs.length + 1}节`, content: ps.slice(i, i + sz).join("\n\n") });
    }
    return chs;
  };

  // Load PDF.js library dynamically
  const loadPdfJs = async () => {
    if (window.pdfjsLib) return window.pdfjsLib;
    return new Promise((resolve, reject) => {
      const script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
      script.onload = () => {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
        resolve(window.pdfjsLib);
      };
      script.onerror = () => reject(new Error("PDF.js 加载失败"));
      document.head.appendChild(script);
    });
  };

  // Extract text from a PDF file
  const extractPdfText = async (file) => {
    const pdfjsLib = await loadPdfJs();
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    let fullText = "";
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const pageText = content.items.map(item => item.str).join("");
      fullText += pageText + "\n\n";
    }
    return fullText;
  };

  // Read text from file: supports both PDF and plain text
  const readFileText = async (file) => {
    const isPdf = file.name.toLowerCase().endsWith(".pdf") || file.type === "application/pdf";
    if (isPdf) {
      return await extractPdfText(file);
    }
    return await file.text();
  };

  const handleFile = async (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    setUploadStatus("正在解析…");
    try {
      const t = await readFileText(f);
      if (!t.trim()) { setUploadStatus("文件内容为空，请检查文件"); return; }
      const n = f.name.replace(/\.(pdf|txt)$/i, "");
      setBookTitle(n); const c = parseTextToChapters(t, n);
      setChapters(c); setUploadStatus(`已解析 ${c.length} 个章节`);
    } catch (err) {
      console.error("File parse error:", err);
      setUploadStatus("解析失败，请确保文件格式正确");
    }
  };
  const handleProfFile = async (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    setProfUploadStatus("正在读取…");
    try {
      const t = await readFileText(f);
      if (!t.trim()) { setProfUploadStatus("文件内容为空"); return; }
      setProfessorContext(t.substring(0, 3000));
      setProfUploadStatus(`已导入: ${f.name}`);
    } catch (err) {
      console.error("Prof file error:", err);
      setProfUploadStatus("读取失败，请确保文件格式正确");
    }
  };
  const handleDemo = () => {
    setBookTitle("单行道 — 瓦尔特·本雅明"); setChapters(DEMO_CHAPTERS);
    setProfessorName("阿多诺");
    setProfessorContext("西奥多·阿多诺，法兰克福学派核心人物，著有《否定辩证法》《启蒙辩证法》《美学理论》等。研究领域涵盖批判理论、美学、音乐哲学和文化工业批判。与本雅明有深厚的学术友谊和思想交流。");
    setUploadStatus("已加载演示书籍");
  };

  const ok = bookTitle && chapters.length > 0 && professorName;
  const inp = {
    width: "100%", padding: "14px 18px", background: "#fffdf8",
    border: `1px solid ${PAPER_DARK}`, borderRadius: 8, color: INK,
    fontSize: 15, fontFamily: "'Noto Serif SC', serif", transition: "border-color 0.2s",
  };

  return (
    <div className="paper-bg" style={{
      minHeight: "100vh", color: INK, fontFamily: "'Noto Serif SC', serif",
      display: "flex", alignItems: "center", justifyContent: "center", padding: "40px 20px",
    }}>
      <GlobalStyles />
      <div style={{ maxWidth: 520, width: "100%" }}>
        {/* Title */}
        <div style={{ textAlign: "center", marginBottom: 52 }}>
          <div style={{ fontSize: 10, letterSpacing: 12, color: INK_FAINT, marginBottom: 18 }}>BITAN</div>
          <h1 style={{
            fontSize: 52, fontWeight: 600, margin: 0, letterSpacing: 16, color: INK,
            fontFamily: "'ZCOOL XiaoWei', serif",
          }}>笔 谈</h1>
          <div style={{ width: 50, height: 1.5, background: `linear-gradient(90deg, transparent, ${ACCENT}, transparent)`, margin: "18px auto" }} />
          <p style={{ fontSize: 14, color: INK_LIGHT, lineHeight: 2 }}>上传书籍，邀请一位学者，在字里行间展开笔谈</p>
        </div>

        {/* Book */}
        <div style={{
          background: "rgba(255,253,248,0.7)", border: `1px solid ${PAPER_DARK}`,
          borderRadius: 14, padding: "26px 24px", marginBottom: 14,
        }}>
          <div style={{ fontSize: 12, color: INK_FAINT, letterSpacing: 3, marginBottom: 16, fontWeight: 500 }}>壹 · 选择书籍</div>
          <input ref={fileRef} type="file" accept=".pdf,.txt" onChange={handleFile} style={{ display: "none" }} />
          <button onClick={() => fileRef.current?.click()} style={{
            width: "100%", padding: 18, background: "#fffdf8", border: `1.5px dashed ${PAPER_DARK}`,
            borderRadius: 10, color: INK_FAINT, cursor: "pointer", fontSize: 14,
            fontFamily: "'Noto Serif SC', serif", transition: "all 0.25s",
          }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = ACCENT; e.currentTarget.style.color = INK_LIGHT; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = PAPER_DARK; e.currentTarget.style.color = INK_FAINT; }}
          >点击上传 PDF 或 TXT 文件</button>
          {uploadStatus && <div style={{ marginTop: 10, fontSize: 13, color: ACCENT }}>{uploadStatus}</div>}
          <div style={{ marginTop: 12, textAlign: "center" }}>
            <button onClick={handleDemo} style={{
              background: "none", border: "none", color: INK_FAINT, fontSize: 12,
              cursor: "pointer", fontFamily: "'Noto Serif SC', serif",
              textDecoration: "underline", textDecorationColor: PAPER_DARK, textUnderlineOffset: 4,
            }}>或使用演示：本雅明《单行道》+ 阿多诺教授</button>
          </div>
        </div>

        {/* Professor */}
        <div style={{
          background: "rgba(255,253,248,0.7)", border: `1px solid ${PAPER_DARK}`,
          borderRadius: 14, padding: "26px 24px", marginBottom: 22,
        }}>
          <div style={{ fontSize: 12, color: INK_FAINT, letterSpacing: 3, marginBottom: 16, fontWeight: 500 }}>贰 · 邀请学者</div>
          <input type="text" placeholder="学者姓名（如：阿多诺、德里达、福柯…）"
            value={professorName} onChange={e => setProfessorName(e.target.value)}
            style={{ ...inp, marginBottom: 10 }} />
          <textarea placeholder="（可选）粘贴学者的学术背景、维基百科内容等…"
            value={professorContext} onChange={e => setProfessorContext(e.target.value)}
            rows={3} style={{ ...inp, resize: "vertical", fontSize: 13, lineHeight: 1.7 }} />
          <input ref={profFileRef} type="file" accept=".pdf,.txt" onChange={handleProfFile} style={{ display: "none" }} />
          <button onClick={() => profFileRef.current?.click()} style={{
            marginTop: 10, padding: 10, background: "transparent", border: `1px dashed ${PAPER_DARK}`,
            borderRadius: 8, color: INK_FAINT, cursor: "pointer", fontSize: 12,
            fontFamily: "'Noto Serif SC', serif", width: "100%",
          }}>或上传学者的论文 / 研究资料</button>
          {profUploadStatus && <div style={{ marginTop: 8, fontSize: 12, color: ACCENT }}>{profUploadStatus}</div>}
        </div>

        <button onClick={() => ok && onStartReading({ bookTitle, chapters, professorName, professorContext })}
          disabled={!ok} style={{
            width: "100%", padding: 18, background: ok ? INK : PAPER_DARK,
            color: ok ? "#f5f0e8" : INK_FAINT, border: "none", borderRadius: 10,
            fontSize: 16, fontFamily: "'Noto Serif SC', serif", cursor: ok ? "pointer" : "default",
            fontWeight: 500, letterSpacing: 5, transition: "all 0.3s",
            boxShadow: ok ? "0 4px 20px rgba(44,36,24,0.12)" : "none",
          }}>开始笔谈</button>
      </div>
    </div>
  );
}

// ── Annotated Paragraph ──
function AnnotatedParagraph({ text, index, isActive, selectedRange, onTextSelect, onDismiss, annotations, professorName, isLoading, commentText, onCommentChange, onSubmit }) {
  const inputRef = useRef(null);
  const paraRef = useRef(null);
  const hasNotes = annotations.length > 0;

  useEffect(() => {
    if (isActive && inputRef.current) setTimeout(() => inputRef.current?.focus(), 80);
  }, [isActive]);

  // Handle mouse-up to capture selected text within this paragraph
  const handleMouseUp = () => {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed || !sel.toString().trim()) return;
    // Check selection is within this paragraph
    if (!paraRef.current) return;
    const range = sel.getRangeAt(0);
    if (!paraRef.current.contains(range.startContainer) || !paraRef.current.contains(range.endContainer)) return;

    const fullText = text;
    const selectedText = sel.toString().trim();
    // Find position of selected text in the paragraph
    const textNode = paraRef.current.childNodes[0]; // the text span
    if (!textNode) return;

    // Use range offsets to find start/end in the full text
    // We need to walk text nodes to find absolute offset
    let start = 0, end = 0;
    const walkNodes = (node, targetNode, targetOffset, accumulated = { val: 0 }) => {
      if (node === targetNode) return accumulated.val + targetOffset;
      if (node.nodeType === 3) { accumulated.val += node.textContent.length; return -1; }
      for (const child of node.childNodes) {
        const r = walkNodes(child, targetNode, targetOffset, accumulated);
        if (r !== -1) return r;
      }
      return -1;
    };

    start = walkNodes(paraRef.current, range.startContainer, range.startOffset);
    end = walkNodes(paraRef.current, range.endContainer, range.endOffset);
    if (start === -1 || end === -1 || start >= end) return;

    onTextSelect(index, selectedText, start, end);
    sel.removeAllRanges();
  };

  // Render text with highlights
  const renderText = () => {
    // Collect all highlight ranges: from annotations + current selection
    const highlights = [];
    annotations.forEach((a) => {
      if (a.type === "user" && a.highlightStart !== undefined) {
        highlights.push({ start: a.highlightStart, end: a.highlightEnd, active: false });
      }
    });
    if (isActive && selectedRange) {
      highlights.push({ start: selectedRange.start, end: selectedRange.end, active: true });
    }

    if (highlights.length === 0) {
      return <span>{text}</span>;
    }

    // Sort highlights by start position
    const sorted = [...highlights].sort((a, b) => a.start - b.start);

    // Build segments
    const segments = [];
    let cursor = 0;
    for (const hl of sorted) {
      if (hl.start > cursor) {
        segments.push({ text: text.slice(cursor, hl.start), highlighted: false, active: false });
      }
      segments.push({ text: text.slice(hl.start, hl.end), highlighted: true, active: hl.active });
      cursor = Math.max(cursor, hl.end);
    }
    if (cursor < text.length) {
      segments.push({ text: text.slice(cursor), highlighted: false, active: false });
    }

    return segments.map((seg, i) => (
      <span key={i} style={seg.highlighted ? {
        background: seg.active ? HIGHLIGHT : "rgba(252,230,138,0.45)",
        borderRadius: 2,
        padding: "1px 0",
        boxShadow: seg.active ? `0 0 8px 1px rgba(240,192,48,0.15)` : "none",
        transition: "all 0.3s",
      } : undefined}>{seg.text}</span>
    ));
  };

  const showBubbles = isActive || hasNotes;

  return (
    <div style={{ marginBottom: 28, position: "relative" }}>
      <div style={{ display: "flex", gap: 0, alignItems: "flex-start" }}>
        {/* Text */}
        <div style={{ flex: "0 0 60%", maxWidth: "60%", paddingRight: 20 }}>
          <p ref={paraRef} onMouseUp={handleMouseUp}
            style={{
              fontSize: 16.5, lineHeight: 2.05, color: INK, margin: 0, cursor: "text",
              padding: "8px 12px", borderRadius: 4, textIndent: "2em",
              borderLeft: (isActive || hasNotes)
                ? `3px solid ${isActive ? HIGHLIGHT_STRONG : "rgba(240,192,48,0.35)"}`
                : "3px solid transparent",
              transition: "border-color 0.3s ease",
            }}>
            {renderText()}
          </p>
        </div>

        {/* Bubbles */}
        <div style={{ flex: "0 0 40%", maxWidth: "40%", paddingTop: 6 }}>
          {showBubbles && (
            <div>
              {/* Connection line */}
              <div style={{
                position: "absolute", left: "60%", top: 18, width: 16, height: 1.5,
                background: `linear-gradient(90deg, ${HIGHLIGHT_STRONG}, rgba(240,192,48,0.3))`,
                transform: "translateX(-8px)",
              }} />

              {annotations.map((c, i) => {
                const isUser = c.type === "user";
                return (
                  <div key={i}
                    className={isUser ? "bubble-in" : "bubble-in-right"}
                    style={{
                      display: "flex",
                      justifyContent: isUser ? "flex-start" : "flex-end",
                      marginBottom: 8,
                    }}>
                    <div style={{
                      maxWidth: "88%",
                      padding: "11px 15px",
                      borderRadius: isUser ? "3px 14px 14px 14px" : "14px 3px 14px 14px",
                      background: isUser ? "#fef9ec" : PROF_BG,
                      border: `1px solid ${isUser ? "#e8d5a0" : PROF_BORDER}`,
                      boxShadow: "0 1px 3px rgba(0,0,0,0.04)",
                    }}>
                      {/* Show quoted text for user comments */}
                      {isUser && c.highlightText && (
                        <div style={{
                          fontSize: 11.5, color: INK_FAINT, marginBottom: 6,
                          paddingLeft: 8, borderLeft: `2px solid ${HIGHLIGHT_STRONG}`,
                          lineHeight: 1.6, fontStyle: "italic",
                        }}>
                          "{c.highlightText.length > 30 ? c.highlightText.slice(0, 30) + "…" : c.highlightText}"
                        </div>
                      )}
                      <div style={{
                        fontSize: 10.5, fontWeight: 600, marginBottom: 5, letterSpacing: 1,
                        color: isUser ? ACCENT : "#4a7a3a",
                      }}>
                        {isUser ? "我" : `${professorName}`}
                        <span style={{ fontWeight: 400, color: INK_FAINT, marginLeft: 6, fontSize: 10 }}>{c.time}</span>
                      </div>
                      <div style={{
                        fontSize: 13.5, lineHeight: 1.85,
                        color: isUser ? INK : "#2a4a1e",
                      }}>{c.text}</div>
                    </div>
                  </div>
                );
              })}

              {/* Loading */}
              {isLoading && (
                <div className="bubble-in-right" style={{ display: "flex", justifyContent: "flex-end", marginBottom: 8 }}>
                  <div style={{
                    padding: "11px 15px", borderRadius: "14px 3px 14px 14px",
                    background: PROF_BG, border: `1px solid ${PROF_BORDER}`,
                  }}>
                    <div style={{ fontSize: 10.5, color: "#4a7a3a", fontWeight: 600, marginBottom: 4, letterSpacing: 1 }}>
                      {professorName}
                    </div>
                    <span className="dot-b" style={{ color: "#6a9a5a" }}>·</span>
                    <span className="dot-b" style={{ color: "#6a9a5a" }}>·</span>
                    <span className="dot-b" style={{ color: "#6a9a5a" }}>·</span>
                  </div>
                </div>
              )}

              {/* Inline input */}
              {isActive && selectedRange && (
                <div className="bubble-in" style={{ marginTop: 4 }}>
                  <div style={{ display: "flex", gap: 6, alignItems: "flex-end", maxWidth: "92%" }}>
                    <textarea ref={inputRef} value={commentText}
                      onChange={e => onCommentChange(e.target.value)}
                      onKeyDown={e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); onSubmit(); } }}
                      placeholder="写下你的批注…"
                      rows={2}
                      style={{
                        flex: 1, padding: "10px 14px", background: "#fffdf8",
                        border: `1.5px solid ${HIGHLIGHT_STRONG}`, borderRadius: "3px 10px 10px 10px",
                        color: INK, fontSize: 13.5, fontFamily: "'Noto Serif SC', serif",
                        resize: "none", lineHeight: 1.65,
                        boxShadow: "0 0 0 3px rgba(240,192,48,0.08)",
                      }} />
                    <button onClick={onSubmit} disabled={!commentText.trim() || isLoading}
                      style={{
                        padding: "10px 14px",
                        background: commentText.trim() && !isLoading ? INK : PAPER_DARK,
                        color: commentText.trim() && !isLoading ? "#f5f0e8" : INK_FAINT,
                        border: "none", borderRadius: 8,
                        cursor: commentText.trim() && !isLoading ? "pointer" : "default",
                        fontSize: 13, fontFamily: "'Noto Serif SC', serif",
                        transition: "all 0.2s", flexShrink: 0,
                      }}>发送</button>
                  </div>
                  <button onClick={onDismiss} style={{
                    background: "none", border: "none", color: INK_FAINT, fontSize: 11,
                    cursor: "pointer", fontFamily: "'Noto Serif SC', serif", marginTop: 6,
                    textDecoration: "underline", textDecorationColor: PAPER_DARK, textUnderlineOffset: 3,
                  }}>取消选择</button>
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

// ── Reading Screen ──
function ReadingScreen({ bookTitle, chapters, professorName, professorContext, onBack }) {
  const [currentChapter, setCurrentChapter] = useState(0);
  const [annotations, setAnnotations] = useState({});
  const [commentText, setCommentText] = useState("");
  const [isLoading, setIsLoading] = useState(false);
  const [showToc, setShowToc] = useState(false);
  const [activePara, setActivePara] = useState(null); // which paragraph has active selection
  const [selectedRange, setSelectedRange] = useState(null); // { start, end, text }
  const [loadingPara, setLoadingPara] = useState(null);
  const contentRef = useRef(null);

  const chapter = chapters[currentChapter];
  const paragraphs = chapter.content.split("\n").filter(p => p.trim());

  useEffect(() => { contentRef.current?.scrollTo(0, 0); setActivePara(null); setSelectedRange(null); setCommentText(""); }, [currentChapter]);

  const aKey = (cid, pi) => `${cid}-${pi}`;

  const totalNotes = Object.values(annotations).reduce((s, a) => s + a.filter(x => x.type === "user").length, 0);

  const handleTextSelect = (paraIndex, selectedText, start, end) => {
    setActivePara(paraIndex);
    setSelectedRange({ start, end, text: selectedText });
    setCommentText("");
  };

  const handleDismiss = () => {
    setActivePara(null);
    setSelectedRange(null);
    setCommentText("");
  };

  const handleSubmit = async (pi) => {
    if (!commentText.trim() || isLoading || !selectedRange) return;
    const txt = commentText.trim();
    const key = aKey(chapter.id, pi);
    const t = new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" });
    const highlightInfo = {
      highlightText: selectedRange.text,
      highlightStart: selectedRange.start,
      highlightEnd: selectedRange.end,
    };
    setAnnotations(p => ({ ...p, [key]: [...(p[key] || []), { type: "user", text: txt, time: t, ...highlightInfo }] }));
    setCommentText(""); setIsLoading(true); setLoadingPara(pi);
    // Keep the selection active to show highlight, but clear the input
    const resp = await generateProfessorResponse(professorName, professorContext, chapter.title, chapter.content, txt);
    setAnnotations(p => ({
      ...p, [key]: [...(p[key] || []), {
        type: "professor", text: resp,
        time: new Date().toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" }),
      }],
    }));
    setIsLoading(false); setLoadingPara(null);
    setActivePara(null); setSelectedRange(null);
  };

  return (
    <div className="paper-bg" style={{
      minHeight: "100vh", color: INK, fontFamily: "'Noto Serif SC', serif",
      display: "flex", flexDirection: "column",
    }}>
      <GlobalStyles />

      {/* Header */}
      <div style={{
        padding: "10px 28px", borderBottom: `1px solid ${PAPER_DARK}`,
        display: "flex", alignItems: "center", justifyContent: "space-between",
        background: "rgba(245,240,232,0.92)", backdropFilter: "blur(12px)",
        position: "sticky", top: 0, zIndex: 100,
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <button onClick={onBack} style={{
            background: "none", border: "none", color: INK_LIGHT, cursor: "pointer",
            fontSize: 13, fontFamily: "'Noto Serif SC', serif",
          }}>← 返回</button>
          <div style={{ width: 1, height: 14, background: PAPER_DARK }} />
          <button onClick={() => setShowToc(!showToc)} style={{
            background: showToc ? "rgba(139,105,20,0.06)" : "none",
            border: "none", color: INK_LIGHT, cursor: "pointer",
            fontSize: 13, fontFamily: "'Noto Serif SC', serif",
            padding: "5px 12px", borderRadius: 6,
          }}>目录</button>
        </div>
        <div style={{ fontSize: 15, color: INK, letterSpacing: 6, fontFamily: "'ZCOOL XiaoWei', serif", fontWeight: 500 }}>
          笔谈
        </div>
        <div style={{ fontSize: 12, color: INK_FAINT }}>
          与 <span style={{ color: ACCENT, fontWeight: 500 }}>{professorName}</span> 共读
          {totalNotes > 0 && <span style={{ marginLeft: 6 }}>· {totalNotes} 则批注</span>}
        </div>
      </div>

      <div style={{ display: "flex", flex: 1 }}>
        {/* TOC */}
        {showToc && (
          <div style={{
            width: 210, borderRight: `1px solid ${PAPER_DARK}`,
            background: "rgba(255,253,248,0.5)", overflowY: "auto", padding: "18px 0", flexShrink: 0,
          }}>
            <div style={{ padding: "0 18px 12px", fontSize: 11, color: INK_FAINT, letterSpacing: 4 }}>目录</div>
            {chapters.map((ch, i) => {
              const n = Object.entries(annotations).filter(([k]) => k.startsWith(`${ch.id}-`))
                .reduce((s, [, l]) => s + l.filter(a => a.type === "user").length, 0);
              return (
                <button key={ch.id} onClick={() => { setCurrentChapter(i); setShowToc(false); }}
                  style={{
                    display: "block", width: "100%", padding: "10px 18px",
                    background: i === currentChapter ? "rgba(139,105,20,0.05)" : "transparent",
                    border: "none", borderLeft: i === currentChapter ? `3px solid ${ACCENT}` : "3px solid transparent",
                    color: i === currentChapter ? INK : INK_LIGHT,
                    cursor: "pointer", fontSize: 14, fontFamily: "'Noto Serif SC', serif", textAlign: "left",
                  }}>
                  {ch.title}
                  {n > 0 && <span style={{
                    marginLeft: 8, fontSize: 10, color: INK_FAINT,
                    background: "rgba(139,105,20,0.07)", padding: "2px 6px", borderRadius: 10,
                  }}>{n}</span>}
                </button>
              );
            })}
          </div>
        )}

        {/* Content */}
        <div ref={contentRef} className="paper-lines" style={{
          flex: 1, overflowY: "auto", padding: "52px 48px 80px",
          maxWidth: 1080, margin: "0 auto", width: "100%", position: "relative",
        }}>
          <div style={{ fontSize: 11, color: INK_FAINT, letterSpacing: 3, marginBottom: 6 }}>{bookTitle}</div>
          <h2 style={{
            fontSize: 28, fontWeight: 500, margin: "0 0 4px", color: INK, letterSpacing: 3,
            fontFamily: "'ZCOOL XiaoWei', serif",
          }}>{chapter.title}</h2>
          <div style={{ fontSize: 12, color: INK_FAINT, marginBottom: 44 }}>{currentChapter + 1} / {chapters.length}</div>

          {paragraphs.map((p, i) => (
            <AnnotatedParagraph key={`${chapter.id}-${i}`}
              text={p} index={i}
              isActive={activePara === i}
              selectedRange={activePara === i ? selectedRange : null}
              onTextSelect={handleTextSelect}
              onDismiss={handleDismiss}
              annotations={annotations[aKey(chapter.id, i)] || []}
              professorName={professorName}
              isLoading={isLoading && loadingPara === i}
              commentText={activePara === i ? commentText : ""}
              onCommentChange={setCommentText}
              onSubmit={() => handleSubmit(i)}
            />
          ))}

          {totalNotes === 0 && (
            <div style={{
              textAlign: "center", padding: "36px 20px", color: INK_FAINT,
              fontSize: 13, lineHeight: 2, borderTop: `1px solid ${PAPER_DARK}`, marginTop: 16,
            }}>
              点击并拖选文中的句子，写下你的批注<br />
              <span style={{ color: ACCENT }}>{professorName}</span> 会在笔谈中回应你
            </div>
          )}

          <div style={{
            display: "flex", justifyContent: "space-between",
            paddingTop: 32, marginTop: 32, borderTop: `1px solid ${PAPER_DARK}`,
          }}>
            <button onClick={() => currentChapter > 0 && setCurrentChapter(currentChapter - 1)}
              disabled={currentChapter === 0}
              style={{
                background: "none", border: "none", fontFamily: "'Noto Serif SC', serif",
                color: currentChapter === 0 ? PAPER_DARK : INK_LIGHT,
                cursor: currentChapter === 0 ? "default" : "pointer", fontSize: 13,
              }}>← 上一章</button>
            <button onClick={() => currentChapter < chapters.length - 1 && setCurrentChapter(currentChapter + 1)}
              disabled={currentChapter === chapters.length - 1}
              style={{
                background: "none", border: "none", fontFamily: "'Noto Serif SC', serif",
                color: currentChapter === chapters.length - 1 ? PAPER_DARK : INK_LIGHT,
                cursor: currentChapter === chapters.length - 1 ? "default" : "pointer", fontSize: 13,
              }}>下一章 →</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function BiTanApp() {
  const [screen, setScreen] = useState("upload");
  const [config, setConfig] = useState(null);
  if (screen === "upload") return <UploadScreen onStartReading={c => { setConfig(c); setScreen("reading"); }} />;
  return <ReadingScreen {...config} onBack={() => setScreen("upload")} />;
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<BiTanApp />);
</script>
</body>
